</head>

<body>
    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="boot-logo">
            <img src="https://win95-portfolio.vercel.app/images/clouds.jpg" alt="Windows 95">
            <div class="boot-text">Microsoft Windows 95</div>
        </div>
        <div class="boot-loader">
            <div class="loader-bar"></div>
        </div>
    </div>

    <!-- Desktop Area -->
    <div id="desktop">
        <!-- Icons added via JS -->
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="sidebar">
            <span class="sidebar-text">Windows 95</span>
        </div>
        <div class="menu-items">
            <div class="menu-item" onmouseenter="showPrograms()">
                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="24">
                Programs <span>▶</span>
                <div id="programs-submenu" class="submenu">
                    <div class="menu-item" onclick="openWindow('agentic'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/entire_network_globe-3.png" width="16">
                        GenAI &amp; Agentic
                    </div>
                    <div class="menu-item" onclick="openWindow('fintech'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/chart1-0.png" width="16">
                        FinTech &amp; Bloomberg
                    </div>
                    <div class="menu-item" onclick="openWindow('data-governance'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/cylinder_database-1.png" width="16">
                        Data &amp; Governance
                    </div>
                    <div class="menu-item" onclick="openWindow('product-management'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="16">
                        Product Owner
                    </div>
                    <div class="menu-item" onclick="openWindow('other-projects'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png" width="16">
                        Other Projects
                    </div>
                    <div class="menu-item" onclick="openWindow('dos'); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/ms_dos-0.png" width="16">
                        MS-DOS Prompt
                    </div>
                </div>
            </div>
            <div class="menu-item" onmouseenter="showSettings()">
                <img src="https://win98icons.alexmeub.com/icons/png/settings_gear-2.png" width="24">
                Settings <span>▶</span>
                <div id="settings-submenu" class="submenu">
                    <div class="menu-item" onclick="openDisplayProperties(); toggleStartMenu()">
                        <img src="https://win98icons.alexmeub.com/icons/png/display_properties-2.png" width="16">
                        Control Panel
                    </div>
                </div>
            </div>
            <div class="menu-item" onmouseenter="hideAllSubmenus()" onclick="openWindow('about'); toggleStartMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/help_book_big-0.png" width="24">
                About Me
            </div>
            <div class="menu-item" onmouseenter="hideAllSubmenus()" onclick="window.open('https://github.com/tnmurthy', '_blank'); toggleStartMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/chm-2.png" width="24">
                GitHub Profile
            </div>
            <div class="menu-item" onmouseenter="hideAllSubmenus()" onclick="window.open('https://www.linkedin.com/in/narayanamurthy-t/', '_blank'); toggleStartMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png" width="24">
                LinkedIn Profile
            </div>
            <div class="menu-item" onmouseenter="hideAllSubmenus()" onclick="openWindow('thought-leadership'); toggleStartMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/notepad-5.png" width="24">
                Thought Leadership
            </div>
            <div class="menu-item" onmouseenter="hideAllSubmenus()" onclick="alert('Shutting down...'); toggleStartMenu()">
                <img src="https://win98icons.alexmeub.com/icons/png/shut_down_normal-2.png" width="24">
                Shut Down...
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <button id="start-button" class="btn-win95" onclick="toggleStartMenu()">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="20">
            Start
        </button>
        <div class="divider"></div>
        <div id="taskbar-items">
            <!-- Active windows go here -->
        </div>
        <div class="divider"></div>
        <div id="clock">12:00 PM</div>
    </div>

    <!-- Templates for reusable windows -->
    <template id="window-template">
        <div class="window" style="top: 50px; left: 50px;">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="" class="window-icon" width="16" height="16">
                    <span class="window-title">Title</span>
                </div>
                <div class="title-bar-controls">
                    <button class="minimize-btn" aria-label="Minimize">_</button>
                    <button class="maximize-btn" aria-label="Maximize">□</button>
                    <button class="close-btn" aria-label="Close">X</button>
                </div>
            </div>
            <div class="window-body">
                <!-- Content goes here -->
            </div>
            <div class="resizer resizer-r"></div>
            <div class="resizer resizer-b"></div>
            <div class="resizer resizer-rb"></div>
            </div>
            </template>

    <script src="projects.js"></script>
    <script src="script.js"></script>
</body>

</html>

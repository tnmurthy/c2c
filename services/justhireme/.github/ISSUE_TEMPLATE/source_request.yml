name: Scraper source request
description: Request or propose a new job source adapter
title: "[Source]: "
labels: ["scraper", "source"]
body:
  - type: input
    id: source
    attributes:
      label: Source name
      placeholder: "Greenhouse company board, Lever, Ashby, etc."
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Public example URL
      description: Do not include private tokens or cookies.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Source type
      options:
        - ATS/company board
        - RSS/API feed
        - Community source
        - Search fallback
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: What fields are available? Does it include dates, location, and apply URLs?

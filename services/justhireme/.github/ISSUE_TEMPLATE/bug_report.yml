name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use sanitized data only. Do not include API keys or private resumes.
      placeholder: "1. Open...\n2. Run...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: OS / app version
      placeholder: "Windows 11, JustHireMe v0.1"

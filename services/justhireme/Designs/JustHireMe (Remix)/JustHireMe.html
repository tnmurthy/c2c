<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JustHireMe — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* BRIGHT CLEAN PAPER */
    --paper:    #FAF7F2;
    --paper-2:  #F4F0E8;
    --paper-3:  #ECE6D9;
    --card:     #FFFFFF;
    --line:     #E8E1D2;
    --line-2:   #D8CFBC;

    --ink:      #1F1A14;
    --ink-2:    #4A3F33;
    --ink-3:    #7A6F62;
    --ink-4:    #B5AC9D;

    /* PASTEL SECTION TINTS — bright, low chroma, matte */
    --blue:        #DCE7F4;   --blue-ink:    #2E4F7E;   --blue-soft:    #EEF3FA;
    --purple:      #E4D9F0;   --purple-ink:  #533D80;   --purple-soft:  #F1ECF8;
    --orange:      #FBDDC4;   --orange-ink:  #8C4A1C;   --orange-soft:  #FCEBDA;
    --pink:        #F5D5DC;   --pink-ink:    #8A3D52;   --pink-soft:    #FAE8EC;
    --green:       #D4E5CD;   --green-ink:   #3F6232;   --green-soft:   #E7F0E2;
    --yellow:      #F5E6B0;   --yellow-ink:  #7A5C12;   --yellow-soft:  #FBF2D5;
    --teal:        #C8E2DD;   --teal-ink:    #235049;   --teal-soft:    #DEEDE9;
    --coral:       #F7CFC2;   --coral-ink:   #8E3F25;   --coral-soft:   #FBE2D9;

    --accent:       #C96442;
    --accent-2:     #A84F31;
    --accent-soft:  #F8DBCC;

    --ok:   #5B8C44;
    --warn: #B57828;
    --bad:  #B4452C;

    --radius:    18px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --radius-xs: 8px;

    --shadow-xs: 0 1px 0 rgba(31,26,20,0.04);
    --shadow-sm: 0 1px 2px rgba(31,26,20,0.05), 0 1px 0 rgba(31,26,20,0.03);
    --shadow-md: 0 4px 14px -6px rgba(31,26,20,0.10), 0 1px 0 rgba(31,26,20,0.04);
    --shadow-lg: 0 18px 40px -16px rgba(31,26,20,0.18), 0 1px 0 rgba(31,26,20,0.04);

    --font-sans:    'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.005em;
  }
  button { font-family: inherit; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* CARD primitive */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
  }
  .card-flat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }

  /* APP SHELL */
  #root { position: relative; height: 100vh; display: flex; background: var(--paper); }
  .app-main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

  /* TYPE */
  h1, h2, h3, h4 { margin: 0; font-weight: 500; letter-spacing: -0.02em; }
  h1 { font-family: var(--font-display); font-size: 56px; line-height: 1.0; letter-spacing: -0.025em; font-weight: 400; }
  h2 { font-family: var(--font-display); font-size: 32px; line-height: 1.05; font-weight: 400; }
  h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.015em; }
  h4 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.025em; }
  .italic-serif { font-family: var(--font-display); font-style: italic; }
  .mono { font-family: var(--font-mono); font-feature-settings: "zero", "ss02"; font-variant-ligatures: none; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-3); }
  .tabular { font-variant-numeric: tabular-nums; }

  /* UTILS */
  .row { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; } .gap-6 { gap: 24px; } .gap-8 { gap: 32px; }
  .grow { flex: 1 1 auto; }

  /* PILL */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    line-height: 1.4;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* BUTTON */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: background .12s ease, border-color .12s ease, transform .08s ease;
    color: var(--ink);
  }
  .btn:hover { background: var(--paper-2); border-color: var(--line-2); }
  .btn:active { transform: scale(0.98); }
  .btn-icon { padding: 7px; border-radius: 9px; }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: #0e0a06; border-color: #0e0a06; }
  .btn-accent { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--paper-2); }

  /* FOCUS */
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

  /* SCROLL CONTAINER */
  .scroll { overflow-y: auto; }
  .lift { transition: background .12s ease, border-color .12s ease, transform .08s ease, box-shadow .12s ease; }

  /* TERMINAL */
  .terminal { font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55; }

  /* DROPZONE */
  .dropzone {
    border: 1.5px dashed var(--line-2);
    border-radius: 22px;
    transition: all .2s ease;
    background: var(--purple-soft);
  }
  .dropzone.over {
    border-color: var(--accent);
    background: var(--coral-soft);
  }

  /* ANIMATIONS */
  @keyframes blink { 50% { opacity: 0.3; } }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .blink { animation: blink 1.4s steps(2) infinite; }
  .pulse-soft { animation: pulse-soft 2.2s ease-in-out infinite; }

  /* SIDEBAR */
  .sidebar {
    width: 248px; min-width: 248px;
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 18px 14px;
    gap: 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 9px 12px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    color: var(--ink-2); cursor: pointer;
    border: 1px solid transparent;
    transition: all .12s ease;
  }
  .nav-item:hover { background: var(--paper-3); color: var(--ink); }
  .nav-item.active {
    background: var(--card); color: var(--ink);
    border-color: var(--line); box-shadow: var(--shadow-xs);
  }
  .nav-item .nav-icon {
    width: 26px; height: 26px; border-radius: 7px;
    display: grid; place-items: center;
  }

  /* TOPBAR (in main column) */
  .topbar {
    display: flex; align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    gap: 16px;
  }

  /* GRID HELPERS */
  .grid-3 { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(340px, 1.4fr) minmax(280px, 1fr); gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .stack { display: flex; flex-direction: column; gap: 14px; }

  .drawer-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(31,26,20,0.5); animation: fade-in .25s ease; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="src/sidebar.jsx"></script>
  <script type="text/babel" src="src/topbar.jsx"></script>

  <script type="text/babel" src="src/views/pipeline.jsx"></script>

</body>
</html>
